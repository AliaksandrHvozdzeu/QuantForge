name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLAMA_CPP_REF: b9193

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev,web]"

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format
        run: ruff format --check src/

  test-package:
    name: Package & config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev,web]"

      - name: CLI version
        run: python -m quantforge --version

      - name: Load default profile
        run: python -m quantforge config --json --profile qwen2.5-coder-7b | head -n 20

      - name: Config loader script (PowerShell helper)
        run: python scripts/load_config.py --profile qwen2.5-coder-7b --print-json | head -n 10

      - name: List profiles
        run: |
          python -c "
          from quantforge.config import list_profiles, load_config
          assert 'qwen2.5-coder-7b' in list_profiles()
          cfg = load_config('qwen2.5-coder-7b')
          assert cfg['quantize_type'] == 'Q5_K_M'
          print('config OK')
          "

      - name: API config (P3)
        run: |
          python -m quantforge serve --print-config --profile qwen2.5-coder-7b | head -n 15
          python -m quantforge serve --print-config --profile qwen2.5-coder-7b --docker | grep '/models/'

      - name: Unit tests
        run: pytest tests/ -q

      - name: Validate Ollama Modelfile (GGUF optional in CI)
        run: python -m quantforge ollama verify

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: pip-audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
          pip-audit

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run shellcheck on quantize.sh
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck scripts/quantize.sh

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build quantizer image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.18.0
        with:
          context: .
          push: false
          load: true
          tags: llama-quantizer:ci
          build-args: |
            LLAMA_CPP_REF=${{ env.LLAMA_CPP_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify llama.cpp tools in image
        run: |
          docker run --rm llama-quantizer:ci bash -lc '
            set -e
            test -f /workspace/llama.cpp/convert_hf_to_gguf.py
            test -x /workspace/llama.cpp/llama-quantize
            test -x /workspace/llama.cpp/llama-bench
            python3 -c "import huggingface_hub, transformers, torch; print(\"python deps OK\")"
          '

  release:
    name: Release
    needs: [lint, test-package, shellcheck, docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Compute release version
        id: ver
        run: |
          set -euo pipefail
          # VERSION in git must stay plain semver (0.6.0). Never commit build suffixes.
          BASE="$(python - <<'PY'
          import pathlib
          import re
          text = pathlib.Path("VERSION").read_text(encoding="utf-8", errors="replace")
          m = re.search(r"(\d+\.\d+\.\d+)", text)
          if not m:
              raise SystemExit(f"Invalid VERSION file: {text!r}")
          print(m.group(1))
          PY
          )"
          BUILD="${GITHUB_RUN_NUMBER}"
          TAG_VERSION="${BASE}-build.${BUILD}"
          PEP440="${BASE}+build.${BUILD}"
          TAG="v${TAG_VERSION}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pep440=${PEP440}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG} | wheel version: ${PEP440}"

      - name: Build Python packages
        run: |
          set -euo pipefail
          printf '%s\n' "${{ steps.ver.outputs.pep440 }}" > VERSION
          pip install build
          python -m build
          ls -la dist/

      - name: Verify wheel version
        run: |
          pip install dist/quantforge-*.whl
          python -m quantforge --version | tee /tmp/version.txt
          grep -F "${{ steps.ver.outputs.pep440 }}" /tmp/version.txt

      - name: Write release notes
        run: |
          set -euo pipefail
          cat > release-notes.md <<NOTES
          Automated release from CI run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          - **Git tag:** \`${{ steps.ver.outputs.tag_version }}\`
          - **Python package:** \`${{ steps.ver.outputs.pep440 }}\`
          - **Base semver:** \`${{ steps.ver.outputs.base }}\`
          - **Commit:** ${{ github.sha }}

          ### Install

          Download **\`quantforge-*.whl\`** or **\`*.tar.gz\`** from the release assets and install:

          \`\`\`bash
          pip install quantforge-*.whl
          \`\`\`

          Bump the base version in [\`VERSION\`](https://github.com/${{ github.repository }}/blob/main/VERSION) when shipping a new semver (e.g. \`0.7.0\`); each green \`main\` build publishes \`VERSION-build.<run>\`.
          NOTES

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          gh release create "${TAG}" dist/*.whl dist/*.tar.gz \
            --title "QuantForge ${{ steps.ver.outputs.tag_version }}" \
            --notes-file release-notes.md \
            --generate-notes
